<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Recaudación</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="w-full max-w-md bg-white rounded-2xl shadow-xl p-6 space-y-6">
        
        <div class="text-center">
            <h1 class="text-2xl font-bold text-gray-800 tracking-tight">Control de Recaudación</h1>
            <p class="text-sm text-gray-500 mt-1">Introduce los datos para calcular el reparto</p>
        </div>

        <hr class="border-gray-200">

        <div class="space-y-4">
            
            <div>
                <label for="bruto" class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fa-solid fa-money-bill-wave text-green-600 mr-1"></i> Bruto (€)
                </label>
                <input type="number" id="bruto" inputmode="decimal" step="0.01" min="0" placeholder="0.00"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-lg font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
            </div>

            <div>
                <label for="tasa" class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fa-solid fa-percentage text-amber-500 mr-1"></i> Tasa (€)
                </label>
                <input type="number" id="tasa" inputmode="decimal" step="0.01" min="0" placeholder="0.00"
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl text-lg font-medium text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition-all">
            </div>

            <div class="relative flex py-2 items-center">
                <div class="flex-grow border-t border-gray-200"></div>
                <span class="flex-shrink mx-4 text-xs text-gray-400 uppercase tracking-wider font-bold">Resultados</span>
                <div class="flex-grow border-t border-gray-200"></div>
            </div>

            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 flex justify-between items-center">
                <span class="text-sm font-medium text-gray-600">Quedan (Bruto - Tasa):</span>
                <span id="quedan" class="text-xl font-bold text-gray-800">0.00 €</span>
            </div>

            <div class="bg-gray-50 p-3 rounded-xl border border-gray-200 flex justify-between items-center">
                <span class="text-sm font-medium text-gray-600">50% (Mitad):</span>
                <span id="mitad" class="text-xl font-bold text-gray-800">0.00 €</span>
            </div>

            <div class="bg-blue-50 p-4 rounded-xl border border-blue-200 flex justify-between items-center shadow-sm">
                <span class="text-base font-bold text-blue-900">Líquido (50% + Tasa):</span>
                <span id="liquido" class="text-2xl font-black text-blue-700">0.00 €</span>
            </div>

        </div>

        <button id="btn-limpiar" class="w-full py-2.5 bg-gray-200 hover:bg-gray-300 active:bg-gray-400 text-gray-700 font-medium rounded-xl text-sm transition-colors flex items-center justify-center gap-2">
            <i class="fa-solid fa-eraser"></i> Limpiar Campos
        </button>

    </div>

    <script>
        // Elementos del DOM
        const inputBruto = document.getElementById('bruto');
        const inputTasa = document.getElementById('tasa');
        
        const txtQuedan = document.getElementById('quedan');
        const txtMitad = document.getElementById('mitad');
        const txtLiquido = document.getElementById('liquido');
        const btnLimpiar = document.getElementById('btn-limpiar');

        // Función principal de cálculo
        function calcular() {
            // Obtenemos los valores o 0 si están vacíos
            const bruto = parseFloat(inputBruto.value) || 0;
            const tasa = parseFloat(inputTasa.value) || 0;

            // 3. Quedan = Bruto - Tasa
            const quedan = bruto - tasa;

            // 4. 50% = Quedan / 2
            const mitad = quedan / 2;

            // 5. Líquido = 50% + Tasa
            const liquido = mitad + tasa;

            // Renderizar resultados formateados a 2 decimales
            txtQuedan.textContent = `${quedan.toFixed(2)} €`;
            txtMitad.textContent = `${mitad.toFixed(2)} €`;
            txtLiquido.textContent = `${liquido.toFixed(2)} €`;
        }

        // Escuchar eventos de escritura en tiempo real
        inputBruto.addEventListener('input', calcular);
        inputTasa.addEventListener('input', calcular);

        // Funcionalidad del botón limpiar
        btnLimpiar.addEventListener('click', () => {
            inputBruto.value = '';
            inputTasa.value = '';
            calcular();
        });
    </script>
</body>
</html>
