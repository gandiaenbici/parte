<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recaudación</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        /* Ocultar flechas en Chrome, Safari, Edge y Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Ocultar flechas en Firefox */
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 antialiased">

    <div class="w-full max-w-sm space-y-3">
        
        <div class="bg-white p-4 rounded-xl border border-gray-200 border-l-4 border-l-blue-500 shadow-xs flex justify-between items-center h-20">
            <div class="flex flex-col flex-grow">
                <label for="bruto" class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Bruto</label>
                <input type="number" id="bruto" inputmode="decimal" step="0.01" placeholder="0.00"
                    class="text-2xl font-semibold mt-1 focus:outline-none text-gray-900 w-full bg-transparent">
            </div>
            <span class="text-xl font-medium text-gray-400 pl-2">€</span>
        </div>

        <div class="bg-white p-4 rounded-xl border border-gray-200 border-l-4 border-l-blue-500 shadow-xs flex justify-between items-center h-20">
            <div class="flex flex-col flex-grow">
                <label for="tasa" class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Tasa</label>
                <input type="number" id="tasa" inputmode="decimal" step="0.01" value="100" placeholder="0.00"
                    class="text-2xl font-semibold mt-1 focus:outline-none text-gray-900 w-full bg-transparent">
            </div>
            <span class="text-xl font-medium text-gray-400 pl-2">€</span>
        </div>

        <div class="bg-white p-4 rounded-xl border border-gray-200 border-l-4 border-l-gray-300 flex justify-between items-center h-20">
            <div class="flex flex-col">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Quedan</span>
                <span class="text-2xl font-semibold text-gray-800 mt-1"><span id="quedan">0.00</span></span>
            </div>
            <span class="text-xl font-medium text-gray-400 pl-2">€</span>
        </div>

        <div class="bg-white p-4 rounded-xl border border-gray-200 border-l-4 border-l-gray-300 flex justify-between items-center h-20">
            <div class="flex flex-col">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">50%</span>
                <span class="text-2xl font-semibold text-gray-800 mt-1"><span id="mitad">0.00</span></span>
            </div>
            <span class="text-xl font-medium text-gray-400 pl-2">€</span>
        </div>

        <div class="bg-white p-4 rounded-xl border border-gray-200 border-l-4 border-l-gray-400 flex justify-between items-center h-20">
            <div class="flex flex-col">
                <span class="text-xs font-semibold text-gray-400 uppercase tracking-wider">Líquido</span>
                <span class="text-2xl font-bold text-black mt-1"><span id="liquido">100.00</span></span>
            </div>
            <span class="text-xl font-bold text-black pl-2">€</span>
        </div>

        <div class="pt-2">
            <button id="btn-limpiar" class="w-full py-3 text-xs text-gray-400 hover:text-gray-600 active:text-gray-800 transition-colors tracking-wide uppercase font-medium">
                Reiniciar valores
            </button>
        </div>

    </div>

    <script>
        const inputBruto = document.getElementById('bruto');
        const inputTasa = document.getElementById('tasa');
        const txtQuedan = document.getElementById('quedan');
        const txtMitad = document.getElementById('mitad');
        const txtLiquido = document.getElementById('liquido');
        const btnLimpiar = document.getElementById('btn-limpiar');

        function calcular() {
            const bruto = parseFloat(inputBruto.value) || 0;
            const tasa = parseFloat(inputTasa.value) || 0;

            const quedan = bruto - tasa;
            const mitad = quedan / 2;
            const liquido = mitad + tasa;

            txtQuedan.textContent = quedan.toFixed(2);
            txtMitad.textContent = mitad.toFixed(2);
            txtLiquido.textContent = liquido.toFixed(2);
        }

        inputBruto.addEventListener('input', calcular);
        inputTasa.addEventListener('input', calcular);

        btnLimpiar.addEventListener('click', () => {
            inputBruto.value = '';
            inputTasa.value = '100';
            calcular();
        });

        calcular();
    </script>
</body>
</html>
